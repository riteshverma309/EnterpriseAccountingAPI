
services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting_postgres
    environment:
      POSTGRES_USER: accounting_user
      POSTGRES_PASSWORD: accounting_pass
      POSTGRES_DB: enterprise_accounting
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_user -d enterprise_accounting"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: accounting_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@accounting.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
